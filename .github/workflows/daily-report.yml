name: Reporte diario de propiedades

on:
  schedule:
    - cron: '0 13 * * 1-6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generar-reporte:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generar reporte
        run: python scripts/generar_reporte.py

      - name: Commit y push
        run: |
          git config user.name "casa-bot"
          git config user.email "casa-bot@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Reporte $(date +'%Y-%m-%d')"
          git push
